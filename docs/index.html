<!doctype html>
<html>
  <head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="//unpkg.com/docsify/themes/vue.css" />
    <link rel="stylesheet" href="//unpkg.com/@sujaykumarh/docsify-plugin-footer/dist/plugin.min.css" />
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar-folder.min.css" />
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.css" />

  </head>
  <body>
    <style>
      img[src*='?logo'] {
        width: 50%;
        position: relative;
        left: 50%;
        transform: translateX(-50%);
      }
      .content img {
        max-height: 400px;
      }
      .cover img {
        width: 80%;
      }
      .markdown-section {
        max-width: 960px;
      }
      .docsify-pagination-container {
        padding: 10px 20px;
        height: auto;
      }
      code.lang-bash {
        position: relative !important;
        margin: 2.2em 5px !important;
        padding: 0 0 0 16px !important;
        overflow-y: hidden !important;
      }
      code.lang-bash::before {
        content: '$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$\a$';
        position: absolute;
        left: 0;
      }
      .pagination-item-title {
        font-size: 1em;
      }
    </style>
    <div id="app"></div>
    <script>
      window.$docsify = {
        name: 'emakefunśĖáś°£šł≠ŚŅÉ',
        //coverpage: ['/', '/zh-cn/'],
        //onlyCover: true,
        loadNavbar: true,
        loadSidebar: true,
        subMaxLevel: 4,
        autoHeader: true,
        auto2top: true,
        nativeEmoji: true,
        logo: '/_media/favicon.jpg', 
        nameLink: {
          '/en/': '#/en/',
          '/zh-tw/': '#/zh-tw/',
          '/zh-cn/': '#/zh-cn/',
        },
        search: {
          maxAge: 86400000,
          paths: 'auto',
          placeholder: {
            '/zh-cn/': 'śźúÁīĘ',
            '/': 'Type to search',
          },
          noData: {
            '/zh-cn/': 'śČĺšłćŚąįÁĽďśěú',
            '/': 'No Results',
          },
          depth: 2,
          hideOtherSidebarContent: false,
        },
        copyCode: {
          buttonText: {
            '/zh-cn/': 'ÁāĻŚáĽŚ§ćŚą∂',
            '/': 'Copy to clipboard',
          },
          errorText: {
            '/zh-cn/': 'ťĒôŤĮĮ',
            '/': 'Error',
          },
          successText: {
            '/zh-cn/': 'Ś§ćŚą∂',
            '/': 'Copied',
          },
        },
        pagination: {
          previousText: {
            '/zh-cn/': 'šłäšłÄÁĮá',
            '/': 'PREVIOUS',
          },
          nextText: {
            '/zh-cn/': 'šłčšłÄÁĮá',
            '/': 'NEXT',
          },
          crossChapter: true,
          crossChapterText: true,
        },
        customPageFooter: {
          copyrightYear: '2026',
          copyrightOwnerName: 'emakefunśĖáś°£šł≠ŚŅÉ',
          copyrightOwnerLink: 'https://github.com/emakefun/emakefun-docsify/',
        },
        plugins: [
          function (hook, vm) {
            hook.mounted(function () {
              if (vm.route.path === '/' || vm.route.path === '/emakefun-docsify' || vm.route.path === '/emakefun-docsify/') {
                location.href = '#/zh-cn/';
              }
            });
            hook.afterEach(function (html) {
              var container = document.createElement('div');
              container.innerHTML = html;
              container.querySelectorAll('img').forEach(function (img) {
                var src = img.getAttribute('src');
                if (src && !src.startsWith('http') && !src.startsWith('/') && !src.startsWith('data:')) {
                  var base = vm.route.file.replace(/[^\/]+$/, '');
                  img.setAttribute('src', base + src);
                }
              });
              return container.innerHTML;
            });
          },
        ],
      };
    </script>
    <script src="//unpkg.com/docsify/lib/docsify.min.js"></script>
    <script src="//unpkg.com/docsify/lib/plugins/search.min.js"></script>
    <script src="//unpkg.com/docsify/lib/plugins/zoom-image.min.js"></script>
    <script src="//unpkg.com/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
    <script src="//unpkg.com/docsify-pagination/dist/docsify-pagination.min.js"></script>
    <script src="//unpkg.com/docsify-pangu/lib/pangu.min.js"></script>
    <script src="//unpkg.com/docsify-bilibili/bilibili.min.js"></script>
    <script src="//unpkg.com/docsify-footnote/dist/docsify-footnote.min.js"></script>
    <script src="//unpkg.com/@h-hg/docsify-image-caption/dist/docsify-image-caption.min.js"></script>
    <script src="//unpkg.com/@sujaykumarh/docsify-plugin-footer/dist/plugin.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-latex@0"></script>
  </body>
</html>
